name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest -q tests.test_sample_instacart tests.test_split_stream_replay_batches tests.test_export_databricks_source_to_ipynb

      - name: Compile Python sources
        run: python -m py_compile notebooks/*.py scripts/*.py tests/*.py

      - name: Verify generated notebooks are current
        run: python scripts/export_databricks_source_to_ipynb.py --check
